<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>知识孪生地图 - 个性化学习系统</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            z-index: 10;
            font-size: 14px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 5px 12px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        .status-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: #eee;
            font-size: 12px;
            z-index: 10;
            backdrop-filter: blur(5px);
            max-width: 200px;
            pointer-events: none;
        }
        .status-panel h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }
        .status-panel ul {
            margin: 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>📚 知识孪生地图</strong> | 颜色：🔴 薄弱(0-30%) | 🟡 一般(30-70%) | 🟢 精通(70-100%)
    </div>
    <div id="controls">
        🔄 自动刷新间隔: 3秒
        <button id="refreshBtn">手动刷新</button>
        <button id="resetBtn">重置掌握度</button>
        <button id="replanBtn">🔄 重新规划路径</button>
    </div>
    <div class="status-panel" id="statusPanel">
        <h3>📊 当前掌握度</h3>
        <ul id="masteryList"></ul>
    </div>

    <!-- 引入 Three.js 核心库和扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        // 透视相机 (视角, 宽高比, 近平面, 远平面)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 开启阴影
        document.body.appendChild(renderer.domElement);

        // CSS2渲染文字
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 轨道控制，允许用户交互 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // --- 辅助元素：地面网格和灯光 ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);
        
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // 主光源方向光
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        // 背光补光
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        // 暖色填充
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // 可选：星星效果（小粒子）
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- 核心数据结构：存储知识点球体与标签 ---
        const nodesMap = new Map(); // key: 节点名称, value: { mesh, labelDiv, mastery }

        // 定义节点初始数据（名称、坐标、颜色初始红色）
        const nodeDefs = [
            { name: "变量", pos: [-2, 1.2, 0] },
            { name: "循环", pos: [0, 1.5, 0.5] },
            { name: "函数", pos: [2, 1.0, -0.2] },
            { name: "类", pos: [-1.2, -0.5, 1] },
            { name: "文件操作", pos: [1.2, -0.8, 0.8] }
        ];

        // 颜色映射函数 (掌握度 0~1)
        function getColorByMastery(mastery) {
            if (mastery < 0.3) return 0xff3333;   // 红
            if (mastery < 0.7) return 0xffaa33;   // 橙黄
            return 0x33ff33;                      // 绿
        }

        // 创建球体和CSS2D文字标签
        nodeDefs.forEach(def => {
            // 球体
            const geometry = new THREE.SphereGeometry(0.65, 64, 64);
            const material = new THREE.MeshStandardMaterial({
                color: getColorByMastery(0),
                roughness: 0.3,
                metalness: 0.1,
                emissive: 0x220000
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(def.pos[0], def.pos[1], def.pos[2]);
            sphere.castShadow = true;
            sphere.receiveShadow = false;
            scene.add(sphere);
            
            // CSS2D文字标签
            const div = document.createElement('div');
            div.textContent = def.name;
            div.style.color = '#fff';
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.backgroundColor = 'rgba(0,0,0,0.6)';
            div.style.padding = '4px 12px';
            div.style.borderRadius = '20px';
            div.style.border = '1px solid rgba(255,255,255,0.3)';
            div.style.backdropFilter = 'blur(4px)';
            div.style.fontFamily = 'sans-serif';
            div.style.pointerEvents = 'none';
            const label = new CSS2DObject(div);
            label.position.set(def.pos[0], def.pos[1] + 0.9, def.pos[2]);
            scene.add(label);
            
            nodesMap.set(def.name, {
                mesh: sphere,
                label: label,
                mastery: 0,
                pos: def.pos
            });
        });
        
        // 添加连接线（显示知识点之间的关联，可选）
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x88aaff });
        const points1 = [nodeDefs[0].pos, nodeDefs[1].pos];
        const points2 = [nodeDefs[1].pos, nodeDefs[2].pos];
        const points3 = [nodeDefs[0].pos, nodeDefs[3].pos];
        const points4 = [nodeDefs[2].pos, nodeDefs[4].pos];
        const points5 = [nodeDefs[3].pos, nodeDefs[4].pos];
        [points1, points2, points3, points4, points5].forEach(pair => {
            const geometry = new THREE.BufferGeometry().setFromPoints(pair.map(p => new THREE.Vector3(p[0], p[1], p[2])));
            const line = new THREE.Line(geometry, lineMaterial);
            scene.add(line);
        });

        // --- 辅助: 从后端获取掌握度并更新界面和3D颜色 ---
        async function fetchAndUpdateStatus() {
            try {
                const response = await fetch('http://localhost:5000/api/get_status');
                const data = await response.json();
                // 更新每个节点的颜色和界面列表
                let listHtml = '';
                for (let [name, mastery] of Object.entries(data)) {
                    if (nodesMap.has(name)) {
                        const node = nodesMap.get(name);
                        node.mastery = mastery;
                        const colorHex = getColorByMastery(mastery);
                        node.mesh.material.color.setHex(colorHex);
                        // 添加微光效果（根据掌握度增加自发光）
                        const intensity = mastery * 0.5;
                        node.mesh.material.emissiveIntensity = intensity;
                    }
                    // 构建右侧掌握度列表
                    const percent = (mastery * 100).toFixed(0);
                    let colorTag = '';
                    if (mastery < 0.3) colorTag = '🔴';
                    else if (mastery < 0.7) colorTag = '🟡';
                    else colorTag = '🟢';
                    listHtml += `<li>${colorTag} ${name}: ${percent}%</li>`;
                }
                document.getElementById('masteryList').innerHTML = listHtml;
            } catch (err) {
                console.error('获取掌握度失败:', err);
            }
        }
        
        // 重置所有掌握度为0
        async function resetMastery() {
            try {
                const nodeNames = Array.from(nodesMap.keys());
                for (let name of nodeNames) {
                    await fetch('http://localhost:5000/api/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ node_name: name, mastery: 0 })
                    });
                }
                fetchAndUpdateStatus();
            } catch (err) {
                console.error('重置失败:', err);
            }
        }
        
        // 手动刷新按钮
        document.getElementById('refreshBtn').addEventListener('click', fetchAndUpdateStatus);
        document.getElementById('resetBtn').addEventListener('click', resetMastery);
        
        // 初次加载 + 定时轮询（每3秒）
        fetchAndUpdateStatus();
        setInterval(fetchAndUpdateStatus, 3000);
        
        // --- 简单动画：让星星缓慢旋转，小球呼吸光晕（可选）---
        let time = 0;
        
        // 添加一个简单的环境动画：粒子旋转
        function animateStars() {
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            requestAnimationFrame(animateStars);
        }
        animateStars();
        
        // --- 主渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 更新轨道控制
            // 让每个球体根据掌握度有轻微脉动（可选，提升视觉反馈）
            nodesMap.forEach((node, name) => {
                const scale = 1 + Math.sin(Date.now() * 0.003) * 0.02 * node.mastery;
                node.mesh.scale.set(scale, scale, scale);
            });
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // 响应窗口大小变化
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 控制台提示
        console.log('知识孪生地图已启动，等待后端API (http://localhost:5000)');
        // 重新规划路径按钮
const replanBtn = document.getElementById('replanBtn');
replanBtn.addEventListener('click', async () => {
    // 1. 获取当前掌握度
    const statusRes = await fetch('http://localhost:5000/api/get_status');
    const mastery = await statusRes.json();
    // 2. 找出已掌握的知识点（掌握度 >= 0.7）
    const mastered = Object.entries(mastery)
        .filter(([_, score]) => score >= 0.7)
        .map(([name, _]) => name);
    // 3. 获取学习目标（弹窗输入）
    const goal = prompt('请输入学习目标（例如：学习Python编程基础）：', '学习Python编程基础');
    if (!goal) return;
    // 4. 调用后端重新规划接口
    const replanRes = await fetch('http://localhost:5000/api/replan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal: goal, mastered: mastered })
    });
    const data = await replanRes.json();
    if (data.status === 'success') {
        alert(`新学习路径：\n${data.steps.join(' → ')}\n\n请按照该路径在终端运行 main.py 继续学习。`);
    } else {
        alert('重新规划失败：' + data.message);
    }
});
    </script>
</body>
</html>
